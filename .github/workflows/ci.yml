name: CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify screenshots exist
        run: |
          for file in landing session-hero replay-view tracks-view waterfall-view graph-view stats-view coach-view; do
            if [ ! -f "docs/screenshots/${file}.png" ]; then
              echo "::error::Missing screenshot: docs/screenshots/${file}.png"
              echo "README references this screenshot. Please capture it and commit."
              exit 1
            fi
          done
          echo "All referenced screenshots present."

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Run PR review guard
        if: github.event_name == 'pull_request'
        id: pr_guard
        continue-on-error: true
        run: npm run pr:guard -- --base "origin/${{ github.base_ref }}" --head HEAD > pr-review-summary.md

      - name: Publish PR review digest to job summary
        if: github.event_name == 'pull_request'
        run: cat pr-review-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR review digest
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          DIGEST_PATH: pr-review-summary.md
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- agentviz-pr-review-digest -->";
            const body = fs.readFileSync(process.env.DIGEST_PATH, "utf8").trim();
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce PR review guard
        if: github.event_name == 'pull_request' && steps.pr_guard.outcome == 'failure'
        run: exit 1
