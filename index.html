<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGENTVIZ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Foundry NextGen Design System */
      :root {
        --av-bg-base: #0A0A0A;
        --av-bg-surface: #141414;
        --av-bg-raised: #1C1C1C;
        --av-bg-hover: #2A2A2A;
        --av-bg-active: #333333;
        --av-focus: #8251EE;
        --av-border: #2A2A2A;
        --av-border-strong: #333333;
        --av-text-primary: #FFFFFF;
        --av-text-secondary: #A1A1A1;
        --av-text-muted: #6B6B6B;
        --av-accent: #8251EE;
        --av-accent-hover: #9366F5;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--av-bg-base);
        overflow: hidden;
        font-family: 'JetBrains Mono', monospace;
        color: var(--av-text-primary);
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--av-border-strong); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #4A4A4A; }

      *:focus-visible { outline: 2px solid var(--av-focus); outline-offset: 2px; }
      *:focus:not(:focus-visible) { outline: none; }

      /* Interactive button base class */
      .av-btn {
        cursor: pointer;
        transition: background 80ms ease-out, border-color 80ms ease-out, color 80ms ease-out;
      }
      .av-btn:hover { background: var(--av-bg-hover); }
      .av-btn:active { background: var(--av-bg-active); }

      /* Interactive row/card hover class */
      .av-interactive {
        transition: background 80ms ease-out;
      }
      .av-interactive:hover { background: var(--av-bg-hover); }

      /* Search input focus styling */
      .av-search:focus { border-color: var(--av-focus) !important; }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
